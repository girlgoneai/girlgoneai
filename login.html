<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Girl Gone AI — Review Access</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    .login-wrap { display:flex; align-items:center; justify-content:center; min-height:80vh; }
    .login-box { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:40px; max-width:400px; width:100%; box-shadow:var(--shadow-lg); text-align:center; }
    .login-box h1 { font-size:1.5rem; margin-bottom:8px; }
    .login-box p { color:var(--text-muted); margin-bottom:24px; font-size:0.95rem; }
    .login-box input[type=password] { width:100%; padding:12px 16px; border:1px solid var(--border);
      border-radius:var(--radius); font-size:1rem; margin-bottom:16px; }
    .login-box button { width:100%; padding:12px; background:var(--accent); color:#fff; border:none;
      border-radius:var(--radius); font-size:1rem; cursor:pointer; font-weight:600; }
    .login-box button:hover { background:var(--accent-hover); }
    .login-error { color:#dc2626; font-size:0.9rem; margin-bottom:12px; display:none; }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-box">
    <h1>Girl Gone AI</h1>
    <p>Enter the review password to access the product catalog.</p>
    <div class="login-error" id="err">Incorrect password. Try again.</div>
    <form onsubmit="return checkPw()">
      <input type="password" id="pw" placeholder="Password" autofocus>
      <button type="submit">Enter</button>
    </form>
  </div>
</div>
<script>
async function sha256(msg){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function checkPw(){
  const pw=document.getElementById('pw').value;
  const hash=await sha256(pw);
  if(hash==='b3663c549efd737afcc2792fafc77b2369475e2e308a66423b77212c6704b4c2'){
    sessionStorage.setItem('nc_auth',hash);
    window.location.href='/';
    return false;
  }
  document.getElementById('err').style.display='block';
  document.getElementById('pw').value='';
  return false;
}
</script>
</body>
</html>
