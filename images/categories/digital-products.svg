<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Package/box icon -->
  <polygon points="200,45 260,75 260,130 200,155 140,130 140,75" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <line x1="200" y1="100" x2="200" y2="155" stroke="white" stroke-width="1.5"/>
  <polyline points="140,75 200,100 260,75" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Top highlight -->
  <polygon points="200,45 260,75 200,100 140,75" fill="rgba(255,255,255,0.1)"/>
  <!-- Download arrow -->
  <line x1="200" y1="65" x2="200" y2="88" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <polyline points="192,82 200,90 208,82" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <circle cx="105" cy="65" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="300" cy="60" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="110" cy="140" r="2" fill="rgba(255,255,255,0.3)"/>
  <circle cx="295" cy="140" r="3" fill="rgba(255,255,255,0.4)"/>
  <!-- Label -->
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">Digital Products</text>
</svg>