<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Spreadsheet grid -->
  <rect x="135" y="45" width="130" height="110" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
  <!-- Header row -->
  <rect x="135" y="45" width="130" height="22" rx="8" fill="rgba(255,255,255,0.15)"/>
  <rect x="135" y="56" width="130" height="11" fill="rgba(255,255,255,0.15)"/>
  <!-- Column dividers -->
  <line x1="175" y1="45" x2="175" y2="155" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="222" y1="45" x2="222" y2="155" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Row dividers -->
  <line x1="135" y1="67" x2="265" y2="67" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="135" y1="89" x2="265" y2="89" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="135" y1="111" x2="265" y2="111" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <line x1="135" y1="133" x2="265" y2="133" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Header text blocks -->
  <rect x="143" y="52" width="22" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="183" y="52" width="28" height="4" rx="2" fill="white" opacity="0.6"/>
  <rect x="230" y="52" width="24" height="4" rx="2" fill="white" opacity="0.6"/>
  <!-- Cell highlights -->
  <rect x="175" y="89" width="47" height="22" fill="rgba(255,255,255,0.15)"/>
  <rect x="222" y="111" width="43" height="22" fill="rgba(255,255,255,0.1)"/>
  <!-- Formula bar -->
  <text x="195" y="103" text-anchor="middle" fill="white" font-family="monospace" font-size="10" opacity="0.6">$1,240</text>
  <!-- Sparkles -->
  <circle cx="100" cy="65" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="310" cy="75" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="305" cy="130" r="2" fill="rgba(255,255,255,0.4)"/>
  <!-- Label -->
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">Spreadsheet Tools</text>
</svg>