<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Notion-style page icon -->
  <rect x="150" y="45" width="100" height="120" rx="8" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2"/>
  <!-- Page fold -->
  <path d="M220,45 L250,45 L250,75 L220,75 Z" fill="rgba(255,255,255,0.1)"/>
  <path d="M220,45 L250,75 L220,75 Z" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
  <!-- Content lines -->
  <rect x="165" y="65" width="45" height="4" rx="2" fill="white" opacity="0.7"/>
  <rect x="165" y="80" width="65" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="165" y="90" width="55" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <rect x="165" y="100" width="60" height="3" rx="1.5" fill="rgba(255,255,255,0.4)"/>
  <!-- Checkbox items -->
  <rect x="165" y="115" width="8" height="8" rx="2" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
  <rect x="180" y="116" width="40" height="3" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <rect x="165" y="130" width="8" height="8" rx="2" fill="white" opacity="0.6"/>
  <polyline points="167,134 170,137 174,131" fill="none" stroke="#334155" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="180" y="131" width="35" height="3" rx="1.5" fill="rgba(255,255,255,0.35)"/>
  <!-- Second page behind -->
  <rect x="160" y="50" width="100" height="120" rx="8" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" transform="translate(12,-8)"/>
  <!-- Sparkles -->
  <circle cx="110" cy="70" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="300" cy="55" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="105" cy="140" r="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Label -->
  <text x="200" y="205" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">Notion Templates</text>
</svg>