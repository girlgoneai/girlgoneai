<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d97706;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Calendar/planner icon -->
  <rect x="145" y="55" width="110" height="100" rx="10" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2"/>
  <line x1="145" y1="80" x2="255" y2="80" stroke="white" stroke-width="2"/>
  <!-- Calendar binding -->
  <line x1="175" y1="48" x2="175" y2="62" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="225" y1="48" x2="225" y2="62" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Grid cells -->
  <rect x="158" y="90" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="183" y="90" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="208" y="90" width="18" height="14" rx="2" fill="white" opacity="0.7"/>
  <rect x="233" y="90" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="158" y="112" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="183" y="112" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="208" y="112" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="233" y="112" width="18" height="14" rx="2" fill="rgba(255,255,255,0.4)"/>
  <rect x="158" y="134" width="18" height="14" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="183" y="134" width="18" height="14" rx="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Checkmark on highlighted cell -->
  <polyline points="212,95 216,99 224,91" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Sparkles -->
  <circle cx="105" cy="70" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="310" cy="65" r="2.5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="295" cy="130" r="2" fill="rgba(255,255,255,0.5)"/>
  <!-- Label -->
  <text x="200" y="200" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">Digital Planners</text>
</svg>