<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Workflow nodes -->
  <circle cx="145" cy="70" r="20" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2"/>
  <circle cx="255" cy="70" r="20" fill="rgba(255,255,255,0.25)" stroke="white" stroke-width="2"/>
  <circle cx="200" cy="130" r="22" fill="rgba(255,255,255,0.3)" stroke="white" stroke-width="2"/>
  <!-- Connecting lines -->
  <line x1="163" y1="78" x2="182" y2="118" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="237" y1="78" x2="218" y2="118" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="70" x2="235" y2="70" stroke="white" stroke-width="2" stroke-linecap="round" stroke-dasharray="4,4"/>
  <!-- Node icons -->
  <!-- Play icon in first node -->
  <polygon points="139,63 139,77 152,70" fill="white" opacity="0.7"/>
  <!-- Gear icon in second node -->
  <circle cx="255" cy="70" r="8" fill="none" stroke="white" stroke-width="1.5" opacity="0.7"/>
  <circle cx="255" cy="70" r="3" fill="white" opacity="0.7"/>
  <!-- Check icon in bottom node -->
  <polyline points="190,130 197,138 212,122" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <!-- Sparkles -->
  <circle cx="105" cy="120" r="3" fill="rgba(255,255,255,0.4)"/>
  <circle cx="305" cy="110" r="2.5" fill="rgba(255,255,255,0.5)"/>
  <circle cx="200" cy="45" r="2" fill="rgba(255,255,255,0.4)"/>
  <circle cx="310" cy="55" r="2" fill="rgba(255,255,255,0.3)"/>
  <!-- Label -->
  <text x="200" y="195" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">Workflow Kits</text>
</svg>