<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="16" fill="url(#bg)"/>
  <!-- Chat bubble icon -->
  <rect x="140" y="50" width="120" height="80" rx="12" fill="rgba(255,255,255,0.2)"/>
  <rect x="140" y="50" width="120" height="80" rx="12" fill="none" stroke="white" stroke-width="2"/>
  <polygon points="170,130 185,130 160,150" fill="rgba(255,255,255,0.2)" stroke="white" stroke-width="2" stroke-linejoin="round"/>
  <!-- Sparkle dots -->
  <circle cx="175" cy="82" r="5" fill="white"/>
  <circle cx="200" cy="82" r="5" fill="white"/>
  <circle cx="225" cy="82" r="5" fill="white"/>
  <!-- Stars -->
  <circle cx="100" cy="70" r="3" fill="rgba(255,255,255,0.5)"/>
  <circle cx="310" cy="60" r="4" fill="rgba(255,255,255,0.4)"/>
  <circle cx="290" cy="120" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="115" cy="130" r="2" fill="rgba(255,255,255,0.5)"/>
  <!-- AI spark lines -->
  <line x1="280" y1="75" x2="295" y2="60" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="285" y1="80" x2="305" y2="75" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Label -->
  <text x="200" y="195" text-anchor="middle" fill="white" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="18" font-weight="600" opacity="0.95">AI Prompt Packs</text>
</svg>